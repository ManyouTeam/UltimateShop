menu-type: search
title: '{lang:menu.search-gui.title}'
size: 54

layout:
  - '00H0N0C00'
  - '001111100'
  - '000000000'
  - '066666660'
  - '066666660'
  - '00B000X00'

input-item: '1'
result-item: '6'

buttons:
  0:
    display-item:
      material: GRAY_STAINED_GLASS_PANE
      name: ' '
  B:
    display-item:
      material: ARROW
      name: '{lang:back-button}'
    actions:
      1:
        type: open_menu
        menu: main
  X:
    display-item:
      material: BARRIER
      name: '{lang:close-button}'
    actions:
      1:
        type: close

action-items:
  H:
    action-type: input-name
    display-item:
      material: HOPPER
      name: '{lang:search-gui-guide-name}'
      lore:
        - '{lang:search-gui-guide-line-1}'
        - '{lang:search-gui-guide-line-2}'
        - '{lang:search-gui-guide-line-3}'
        - '{lang:search-gui-guide-line-4}'
  C:
    action-type: clear-search
    display-item:
      material: BARRIER
      name: '{lang:search-gui-clear-name}'
      lore:
        - '{lang:search-gui-clear-line-1}'

state-items:
  N:
    empty-input:
      display-item:
        material: PAPER
        name: '{lang:search-gui-empty-name}'
        lore:
          - '{lang:search-gui-empty-line-1}'
          - '{lang:search-gui-empty-line-2}'
    has-input:
      display-item:
        material: COMPASS
        name: '{lang:search-gui-state-name}'
        lore:
          - '{lang:search-gui-state-line-1}'
          - '{lang:search-gui-state-line-2}'
          - '{lang:search-gui-state-line-3}'

no-result-item:
  slot: 31
  display-item:
    material: BARRIER
    name: '{lang:search-gui-no-result-name}'
    lore:
      - '{lang:search-gui-no-result-line-1}'
      - '{lang:search-gui-no-result-line-2}'

result-lore:
  - ' '
  - '{lang:search-gui-result-shop}'
  - '{lang:search-gui-result-product}'
  - '{lang:search-gui-result-click}'
