title: '{lang:shop-title}'
size: 54

bedrock:
  enabled: true
  content: '{lang:welcome-message}'

open-actions:
  1:
    type: sound
    sound: block.note_block.pling
    open-once: true

layout:
  - '00Y0S0X00'
  - '000000000'
  - '0ABCDEFG0'
  - '0HIJKLMN0'
  - '000000000'
  - '0000Z0000'

buttons:
  0:
    display-item:
      material: BLACK_STAINED_GLASS_PANE
      name: ' '
  Y:
    display-item:
      material: HOPPER
      name: '{lang:search-menu-button-name} &c(PREMIUM)'
      lore:
        - '{lang:search-menu-button-line-1}'
        - '{lang:search-menu-button-line-2}'
    actions:
      1:
        type: open_menu
        menu: search
  X:
    display-item:
      material: NAME_TAG
      name: '{lang:favourite-menu-button-name} &c(PREMIUM)'
      lore:
        - '{lang:favourite-menu-button-line-1}'
        - '{lang:favourite-menu-button-line-2}'
    actions:
      1:
        type: open_menu
        menu: favourite
  S:
    display-item:
      material: CHEST
      name: '{lang:sell-all-menu-button-name}'
      lore:
        - '{lang:sell-all-menu-button-line-1}'
        - '{lang:sell-all-menu-button-line-2}'
    actions:
      1:
        type: sell_all_menu
  A:
    display-item:
      material: WHEAT
      name: '{lang:farming-name}'
      lore:
        - '{lang:farming-lore-1}'
        - '{lang:farming-lore-2}'
    actions:
      1:
        type: shop_menu
        shop: farming
  B:
    display-item:
      material: BONE
      name: '{lang:drops-name}'
