# PREMIUM version only.

title: '{shop-name}'
size: 36

open-actions:
  1:
    type: sound
    sound: item.book.page_turn

dynamic-layout: true

layout:
  - '000000000'
  - '000`{random_daily;;1}``{random_daily;;2}``{random_daily;;3}`000'
  - '000000000'
  - '00003000c'

buttons:
  0:
    display-item:
      material: BLACK_STAINED_GLASS_PANE
      name: ' '
  3:
    display-item:
      material: ARROW
      name: '{lang:back-button}'
    actions:
      1:
        type: open_menu
        menu: main
  c:
    display-item:
      material: BARRIER
      name: '{lang:close-button}'
    actions:
      1:
        type: close
